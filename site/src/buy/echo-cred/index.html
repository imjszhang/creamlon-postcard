<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Creamlon Postcard Checkout</title>
    <style>
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17202a;
        background: #f7f9fb;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 34px;
      }
      h2 {
        margin-top: 28px;
        font-size: 20px;
      }
      label {
        display: block;
        margin: 16px 0 6px;
        font-weight: 700;
      }
      input {
        box-sizing: border-box;
        width: 100%;
        max-width: 420px;
        padding: 10px 12px;
        border: 1px solid #b9c4d4;
        border-radius: 8px;
        font-size: 16px;
      }
      pre {
        overflow: auto;
        padding: 14px;
        border: 1px solid #d7deea;
        border-radius: 8px;
        background: white;
        line-height: 1.45;
      }
      .note {
        color: #48566a;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Echo Credential Checkout</h1>
      <p class="note">
        Demo price: 0 POSTCARD. This page creates no secrets; it only prepares
        the simulated paid receipt and public redeem request for buyer agents.
      </p>

      <label for="github">Buyer GitHub login</label>
      <input id="github" autocomplete="username" placeholder="buyer-login">

      <label for="inbox">Private inbox repo</label>
      <input id="inbox" placeholder="buyer-login/creamlon-inbox-postcard">

      <label for="ref">Ref</label>
      <input id="ref" value="postcard-demo">

      <h2>Private inbox manifest</h2>
      <pre id="manifest"></pre>

      <h2>Private purchase receipt</h2>
      <pre id="receipt"></pre>

      <h2>Public purchase redeem Issue body</h2>
      <pre id="issue"></pre>
    </main>
    <script>
      const github = document.querySelector("#github");
      const inbox = document.querySelector("#inbox");
      const ref = document.querySelector("#ref");
      const manifest = document.querySelector("#manifest");
      const receipt = document.querySelector("#receipt");
      const issue = document.querySelector("#issue");

      function cleanLogin(value) {
        return value.trim().toLowerCase().replace(/[^a-z0-9-]/g, "").slice(0, 39);
      }

      function render() {
        const login = cleanLogin(github.value) || "buyer-login";
        if (!inbox.value.trim() || inbox.value === "buyer-login/creamlon-inbox-postcard") {
          inbox.value = `${login}/creamlon-inbox-postcard`;
        }
        const safeRef = (ref.value.trim() || "postcard-demo").replace(/[^A-Za-z0-9_.:-]/g, "-").slice(0, 64);
        const today = new Date().toISOString().slice(0, 10).replace(/-/g, "");
        const paymentIntentId = `pi_demo_${today}_${login}`;
        const receiptPath = `.creamlon-inbox/purchases/${paymentIntentId}.json`;
        const manifestValue = {
          version: "1",
          type: "creamlon_private_inbox",
          owner: `github:${login}`,
          seller: "github:imjszhang",
          public_request_repo: "imjszhang/creamlon-postcard",
          purpose: "credential-and-delivery-inbox"
        };
        const receiptValue = {
          version: "1",
          type: "purchase_receipt",
          payment_intent_id: paymentIntentId,
          provider: "github-pages-demo-vendor",
          status: "paid",
          buyer: `github:${login}`,
          capability_id: "echo-cred",
          ref: safeRef,
          created_at: new Date().toISOString()
        };
        const issueValue = [
          "type: purchase-redeem",
          'version: "1"',
          "provider: github-pages-demo-vendor",
          `payment_intent_id: ${paymentIntentId}`,
          "capability_id: echo-cred",
          `buyer: github:${login}`,
          `inbox_repo: ${inbox.value.trim()}`,
          `receipt_path: ${receiptPath}`
        ].join("\n");
        manifest.textContent = JSON.stringify(manifestValue, null, 2);
        receipt.textContent = JSON.stringify(receiptValue, null, 2);
        issue.textContent = issueValue;
      }

      github.addEventListener("input", render);
      inbox.addEventListener("input", render);
      ref.addEventListener("input", render);
      render();
    </script>
  </body>
</html>
