version: "1"
name: creamlon-postcard
description: Creamlon Postcard is a playable demo melon for one-time credential tasks and signed delivery proofs.
identity:
  type: ed25519
  public_key: "kwckaviKJVmQDwSGMISxpMYlkLD-aad8LbW5P0X_8ok"
status: available
capabilities:
  - id: echo
    description: Free echo postcard smoke test
    input:
      media_types:
        - text/plain
    output:
      media_types:
        - text/plain
  - id: echo-cred
    description: Credential-gated Creamlon Postcard demo
    input:
      media_types:
        - text/plain
    output:
      media_types:
        - text/plain
    access:
      mode: credential
      units: 1
profiles:
  github:
    transport: issues
  credential:
    scheme: voucher-hmac-v1
    instructions: "Use the GitHub Pages demo checkout, create a private GitHub inbox repository, and open a purchase-redeem Issue. The seller writes the complete one-time credential only to the private inbox."
extensions:
  payment:
    pattern: payment-bridge-v1
    instructions: "Open the GitHub Pages demo checkout, create a buyer-owned private inbox repo, write the demo paid receipt there, then open a public purchase-redeem Issue."
    providers:
      - id: github-pages-demo-vendor
        capability_id: echo-cred
        resource_url: https://imjszhang.github.io/creamlon-postcard/
        network: github
        asset: postcard-ticket
        price: "0"
        delivery: github-private-inbox
