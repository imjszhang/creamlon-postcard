<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{headline}}</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #3b2b24;
        --accent: #d98666;
        --accent-dark: #9d5a49;
        --paper: #fffaf1;
        --line: rgba(59, 43, 36, 0.18);
        --page-bg:
          radial-gradient(circle at 16% 18%, rgba(255, 202, 155, 0.5), transparent 25%),
          radial-gradient(circle at 85% 28%, rgba(255, 226, 164, 0.6), transparent 30%),
          linear-gradient(135deg, #fff4df 0%, #ffe3cd 52%, #f7c5b8 100%);
        --art-gradient: linear-gradient(145deg, #f7a88c, #ffe5ae 48%, #a6d5bf);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1200px;
        height: 800px;
        overflow: hidden;
        background: var(--page-bg);
        font-family: "Segoe UI", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif;
        color: var(--ink);
      }

      .postcard {
        position: relative;
        width: 1120px;
        height: 720px;
        margin: 40px;
        padding: 54px 62px;
        border: 1px solid rgba(255, 255, 255, 0.9);
        border-radius: 34px;
        background:
          linear-gradient(90deg, transparent 0 53%, var(--line) 53% calc(53% + 2px), transparent calc(53% + 2px)),
          repeating-linear-gradient(0deg, transparent 0 58px, rgba(59, 43, 36, 0.08) 59px 60px),
          var(--paper);
        box-shadow: 0 28px 70px rgba(120, 65, 45, 0.26);
      }

      .postcard::before {
        content: "";
        position: absolute;
        inset: 18px;
        border: 1px dashed color-mix(in srgb, var(--accent-dark), transparent 62%);
        border-radius: 24px;
        pointer-events: none;
      }

      .stamp {
        position: absolute;
        top: 44px;
        right: 48px;
        width: 132px;
        height: 132px;
        display: grid;
        place-items: center;
        padding: 10px;
        border: 3px dashed rgba(157, 90, 73, 0.45);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
      }

      .stamp img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 999px;
        filter: drop-shadow(0 6px 14px rgba(120, 65, 45, 0.18));
      }

      .art {
        position: absolute;
        left: 64px;
        top: 76px;
        width: 468px;
        height: 354px;
        border-radius: 28px;
        background: var(--art-gradient);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.42);
        overflow: hidden;
      }

      .art::before,
      .art::after {
        content: "";
        position: absolute;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.68);
      }

      .art::before {
        width: 520px;
        height: 160px;
        left: -35px;
        bottom: -68px;
      }

      .art::after {
        width: 220px;
        height: 220px;
        right: -48px;
        top: -48px;
      }

      .art-shape {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: var(--s);
        height: var(--s);
        border-radius: var(--r);
        background: var(--c);
        filter: var(--b);
        opacity: 0.46;
        mix-blend-mode: screen;
      }

      .theme {
        position: absolute;
        left: 92px;
        top: 462px;
        width: 410px;
        color: var(--accent-dark);
        font-size: 26px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .message {
        position: absolute;
        right: 72px;
        top: 206px;
        width: 430px;
      }

      h1 {
        margin: 0 0 30px;
        font-family: Georgia, "Noto Serif CJK SC", "Microsoft YaHei", "Times New Roman", serif;
        font-size: 56px;
        line-height: 1.02;
        color: var(--accent-dark);
      }

      .body {
        font-size: 32px;
        line-height: 1.34;
        white-space: pre-wrap;
      }

      .signature {
        margin-top: 38px;
        font-family: Georgia, "Noto Serif CJK SC", "Microsoft YaHei", "Times New Roman", serif;
        font-size: 34px;
        color: var(--accent);
      }

      .digest-stamp {
        position: absolute;
        right: 58px;
        bottom: 46px;
        display: grid;
        gap: 8px;
        justify-items: center;
        padding: 14px 16px 12px;
        border: 2px solid color-mix(in srgb, var(--accent-dark), transparent 54%);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.68);
        color: var(--accent-dark);
        transform: rotate(calc(var(--stamp-rotate, 0) * 1deg));
        box-shadow: 0 14px 32px rgba(120, 65, 45, 0.12);
      }

      .digest-label,
      .serial {
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .fingerprint {
        display: grid;
        grid-template-columns: repeat(8, 8px);
        gap: 4px;
      }

      .fingerprint span {
        width: 8px;
        height: 8px;
        border-radius: 3px;
        background: var(--accent-dark);
      }

      .digest {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 12px;
        font-weight: 800;
      }

      .footer {
        position: absolute;
        left: 64px;
        bottom: 42px;
        font-size: 18px;
        letter-spacing: 0.14em;
        color: rgba(59, 43, 36, 0.52);
        text-transform: uppercase;
      }
    </style>
  </head>
  <body style="{{body_style}}">
    <main class="postcard">
      <div class="stamp"><img src="{{logo_src}}" alt="Creamlon"></div>
      <section class="art" aria-label="Generated postcard art">{{art_shapes}}</section>
      <div class="theme">{{theme}}</div>
      <section class="message">
        <h1>{{headline}}</h1>
        <div class="body">{{message}}</div>
        <div class="signature">{{signature}}</div>
      </section>
      <section class="digest-stamp" style="--stamp-rotate: {{stamp_rotation}}" aria-label="Deterministic digest fingerprint">
        <div class="digest-label">Verified seed</div>
        <div class="fingerprint" aria-hidden="true">{{fingerprint_cells}}</div>
        <div class="digest">{{digest_short}}</div>
        <div class="serial">{{serial}}</div>
      </section>
      <div class="footer">Private postcard delivery</div>
    </main>
  </body>
</html>
